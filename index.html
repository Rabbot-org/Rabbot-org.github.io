<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rabbot.org – Innovation Lab & Rapid Prototyping</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a1628;
            --accent: #00d4ff;
            --accent-subtle: #00a8cc;
            --text-light: #e8eef5;
            --text-muted: #a8b5c5;
            --border: #1a2a3a;
            --bg-grad-1: #0a1628;
            --bg-grad-2: #0f1f35;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
            color: var(--text-light);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            letter-spacing: 0.3px;
            position: relative;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(0, 212, 255, 0.05) 25%, rgba(0, 212, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 212, 255, 0.05) 75%, rgba(0, 212, 255, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 212, 255, 0.05) 25%, rgba(0, 212, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 212, 255, 0.05) 75%, rgba(0, 212, 255, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
            animation: grid-shift 20s linear infinite;
        }

        @keyframes grid-shift {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        /* Floating accent orbs */
        body::after {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.15) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: float-orb 6s ease-in-out infinite;
        }

        @keyframes float-orb {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-30px, 30px); }
        }

        .container {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .content {
            text-align: center;
            max-width: 600px;
            animation: fade-in 0.8s ease-out forwards;
            opacity: 0;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-mark {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            opacity: 0.95;
            animation: logo-pulse 2s ease-in-out infinite;
            animation-delay: 0.3s;
        }

        @keyframes logo-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text-light) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: slide-in 0.8s ease-out 0.1s forwards;
            opacity: 0;
        }

        @keyframes slide-in {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-weight: 400;
            animation: slide-in 0.8s ease-out 0.2s forwards;
            opacity: 0;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: 1px solid var(--border);
            border-radius: 50px;
            background: rgba(0, 212, 255, 0.08);
            font-size: 0.95rem;
            color: var(--accent);
            margin-bottom: 1.5rem;
            animation: slide-in 0.8s ease-out 0.3s forwards;
            opacity: 0;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { 
                background: var(--accent);
                box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.7);
            }
            50% {
                box-shadow: 0 0 0 8px rgba(0, 212, 255, 0);
            }
        }

        .description {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
            animation: slide-in 0.8s ease-out 0.4s forwards;
            opacity: 0;
        }

        .cta-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            animation: slide-in 0.8s ease-out 0.5s forwards;
            opacity: 0;
        }

        .email-input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        input[type="email"] {
            flex: 1;
            padding: 0.9rem 1.2rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: rgba(10, 22, 40, 0.6);
            color: var(--text-light);
            font-size: 1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        input[type="email"]::placeholder {
            color: var(--text-muted);
        }

        input[type="email"]:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(10, 22, 40, 0.8);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        button {
            padding: 0.9rem 2rem;
            border: 1px solid var(--accent);
            border-radius: 6px;
            background: var(--accent);
            color: var(--primary);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--accent-subtle);
            border-color: var(--accent-subtle);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
            opacity: var(--text-muted);
            font-size: 0.9rem;
        }

        .social-links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s ease;
            border-bottom: 1px solid transparent;
        }

        .social-links a:hover {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .footer-note {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-muted);
            animation: slide-in 0.8s ease-out 0.6s forwards;
            opacity: 0;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .logo-mark {
                font-size: 2.5rem;
            }

            .email-input-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="logo-mark">🚀</div>
            
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>Im Aufbau</span>
            </div>

            <h1>rabbot.org</h1>
            <p class="subtitle">Innovation Lab & Rapid Prototyping</p>

            <p class="description">
                Wir arbeiten an etwas Großem. Die Website wird bald online gehen. <br>
                Bleib auf dem Laufenden.
            </p>

            
            <form action="https://formspree.io/f/xzdwnpbk" method="POST" class="cta-section">
				<div class="email-input-group">
					<input type="email" name="email" placeholder="Deine E-Mail-Adresse" required>
					<button type="submit">Benachrichtig mich</button>
				</div>
			</form>
          

            <div class="social-links">
                <a href="https://linkedin.com" target="_blank">LinkedIn</a>
                <a href="https://github.com" target="_blank">GitHub</a>
                <a href="mailto:hello@rabbot.org">Kontakt</a>
            </div>

            <div class="footer-note">
                <p>Christian Haase<br>Business Excellence Architect & Senior Consultant</p>
            </div>
        </div>
    </div>

    <script>
        function handleNotify() {
            const email = document.getElementById('emailInput').value;
            if (email && email.includes('@')) {
                alert('Danke! Wir werden dich kontaktieren.');
                document.getElementById('emailInput').value = '';
            } else {
                alert('Bitte gib eine gültige E-Mail-Adresse ein.');
            }
        }

        document.getElementById('emailInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleNotify();
        });
    </script>
</body>
</html>
